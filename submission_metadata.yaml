  - "Gemini"

ai_usage_summary: |
  Used Claude for architecture discussion, code review, and methodology
  documentation. Used Gemini for generating the system architecture diagram.
  No candidate profile data was fed to any hosted LLM during ranking.
  All scoring logic is fully local, rule-based, and regex-driven — zero
  external API calls are made during the ranking step.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based ranker with explicit domain signal detection and multi-layer
  integrity checks. The pipeline operates in two passes over ~100K candidates.

  Pass 1 scores each candidate across five components: (1) domain signal score
  from three compiled regex term banks (STRONG/MEDIUM/WEAK) applied to career
  text and skills separately — skills are downweighted and capped at 60 pts to
  neutralize keyword stuffers; (2) behavioral signals (assessment scores,
  recruiter saves, response rate, interview completion, GitHub activity) gated
  on domain signal > 0 to prevent engagement-only candidates from ranking; (3)
  availability signals (open_to_work, last active date, notice period); (4)
  experience fit bonus for the 5–9 year sweet spot; (5) hard disqualifiers
  including six honeypot checks (duplicate achievements, anachronistic certs,
  anachronistic institution enrollment, experience inflation, degree-institution
  mismatch, degree duration anomaly) each applying a −2000 penalty.

  Pass 2 detects cross-candidate template twins via an inverted description
  index and penalizes the weaker duplicate by −50. Final scores are normalized
  to [0.01, 1.00] for submission.

